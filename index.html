<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>AtomCode</title>
  <style>
    /* ─── Reset & Variables ────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242838;
      --border: #2d3248;
      --text: #e1e4f0;
      --text-dim: #8b90a8;
      --accent: #7c5cfc;
      --accent-hover: #6a4ae8;
      --user-msg: #2d3248;
      --ai-msg: #1a1d27;
      --success: #34d399;
      --error: #f87171;
      --radius: 10px;
      --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Layout ──────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h3 {
      font-size: 14px;
      font-weight: 600;
    }

    #new-session-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #new-session-btn:hover {
      background: var(--accent-hover);
    }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    #session-list::-webkit-scrollbar {
      width: 4px;
    }

    #session-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #session-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .session-item {
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 6px;
      margin: 2px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      transition: background 0.15s;
    }

    .session-item:hover {
      background: var(--surface);
    }

    .session-item.active {
      background: var(--surface);
    }

    .session-item .session-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s, color 0.15s;
    }

    .session-item:hover .session-delete {
      opacity: 1;
    }

    .session-delete:hover {
      color: var(--error);
    }

    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      -webkit-app-region: drag;
    }

    header .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      -webkit-app-region: no-drag;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header .subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
      -webkit-app-region: no-drag;
    }

    /* ─── Chat area ───────────────────────────────────── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-container::-webkit-scrollbar {
      width: 6px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
    }

    .msg .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg .bubble pre {
      background: var(--bg);
      border-radius: 6px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
    }

    .msg .bubble code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface-2);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .msg .bubble pre code {
      background: transparent;
      padding: 0;
    }

    .msg .label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .msg.user .label {
      text-align: right;
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ─── Tool call rendering ─────────────────────────── */
    .tool-call {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin: 8px 0;
      font-family: var(--mono);
      font-size: 13px;
    }

    .tool-call .tc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 500;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .tool-call .tc-args {
      color: var(--text-dim);
      white-space: pre-wrap;
      font-size: 12px;
    }

    .tool-result {
      background: #1a2e2a;
      border: 1px solid #2a4a3e;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 8px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--success);
    }

    .tool-error {
      background: #2e1a1a;
      border: 1px solid #4a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 8px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--error);
    }

    /* ─── Input area ──────────────────────────────────── */
    #input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #message-input:focus {
      border-color: var(--accent);
    }

    #message-input::placeholder {
      color: var(--text-dim);
    }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #send-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ─── Settings panel ──────────────────────────────── */
    #settings-panel {
      display: none;
      padding: 16px 20px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-direction: column;
    }

    #settings-panel.open {
      display: flex;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-row label {
      font-size: 13px;
      color: var(--text-dim);
      min-width: 80px;
    }

    .settings-row input, .settings-row select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .settings-row input:focus {
      border-color: var(--accent);
    }

    #settings-toggle {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      -webkit-app-region: no-drag;
    }

    #settings-toggle:hover {
      color: var(--text);
    }

    /* ─── Welcome screen ──────────────────────────────── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }

    #welcome .big-icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    #welcome h2 {
      font-size: 20px;
      color: var(--text);
      font-weight: 600;
    }

    #welcome p {
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* ─── Markdown Rendering ──────────────────────── */
    .markdown-body { line-height: 1.7; word-wrap: break-word; }
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 { margin: 16px 0 8px; color: var(--text); font-weight: 600; }
    .markdown-body h1 { font-size: 1.4em; }
    .markdown-body h2 { font-size: 1.2em; }
    .markdown-body h3 { font-size: 1.1em; }
    .markdown-body h4 { font-size: 1em; }
    .markdown-body p { margin: 6px 0; line-height: 1.7; }
    .markdown-body ul,
    .markdown-body ol { padding-left: 22px; margin: 6px 0; line-height: 1.7; }
    .markdown-body li { margin: 3px 0; }
    .markdown-body code {
      background: var(--surface-2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }
    .markdown-body pre {
      margin: 12px 0;
      background: var(--surface-2);
      border-radius: 8px;
      overflow-x: auto;
    }
    .markdown-body pre code {
      display: block;
      padding: 14px 16px;
      background: none;
      border-radius: 0;
      font-size: 0.85em;
      line-height: 1.5;
    }
    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 0.92em;
    }
    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .markdown-body th { background: var(--surface-2); font-weight: 600; }
    .markdown-body a { color: var(--accent); text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      margin: 10px 0;
      color: var(--text-dim);
    }
    .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .hidden { display: none !important; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 20px;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h3>对话</h3>
        <button id="new-session-btn">+</button>
      </div>
      <div id="session-list"></div>
    </div>

    <!-- Main Area -->
    <div id="main-area">
      <!-- Header -->
      <header>
        <div class="logo">A</div>
        <h1>AtomCode</h1>
        <button id="settings-toggle" title="设置">⚙️</button>
        <span class="subtitle">100% AI 开发</span>
      </header>

      <!-- Settings -->
      <div id="settings-panel">
        <div class="settings-row">
          <label>状态</label>
          <span id="atomcode-status" style="color: var(--success); font-size: 13px;">检查中...</span>
        </div>
        <div class="settings-row">
          <label>路径</label>
          <span id="atomcode-path" style="color: var(--text-dim); font-size: 12px;"></span>
        </div>
        <div class="settings-row">
          <label>工作目录</label>
          <input type="text" id="cwd-input" />
        </div>
      </div>

      <!-- Chat -->
      <div id="chat-container">
        <div id="welcome">
          <div class="big-icon">A</div>
          <h2>AtomCode GUI</h2>
          <p>100% AI 开发的开源桌面客户端<br/>通过本地 atomcode 引擎驱动</p>
        </div>
      </div>

      <!-- Input -->
      <div id="input-area">
        <div id="input-row">
          <textarea
            id="message-input"
            rows="1"
            placeholder="输入消息..."
            autofocus
          ></textarea>
          <button id="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-dot"></span>
        <span id="status-text">就绪</span>
      </div>
    </div>
  </div>

  <script src="node_modules/markdown-it/dist/markdown-it.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
